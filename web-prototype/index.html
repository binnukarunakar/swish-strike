<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0A0B0E" />
  <title>Swish Strike — point your camera, keep score</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23FF5A1F'/%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- HOME -->
  <section id="home" class="screen active">
    <header class="home-header">
      <div>
        <div class="wordmark">Swish Strike<span class="dot">.</span></div>
        <div class="tagline">Point your camera. We'll keep score.</div>
      </div>
      <div class="status-pill"><span class="status-dot warm"></span> on-device</div>
    </header>
    <div id="grid" class="grid"></div>
  </section>

  <!-- GAME (setup → play → result, by data-phase) -->
  <section id="game" class="screen" data-phase="setup">
    <div class="stage" id="stage">
      <video id="video" playsinline muted></video>
      <canvas id="overlay"></canvas>

      <div class="topbar">
        <button id="game-back" class="btn">‹ Games</button>
        <div id="game-name" class="game-name">Game</div>
        <div class="src-toggle">
          <button id="src-sim" class="on">Sim</button>
          <button id="src-cam">Cam</button>
          <button id="voice-btn" class="icon-btn" title="Voice callouts" aria-label="Voice callouts"></button>
        </div>
      </div>

      <!-- live count + per-player (play) -->
      <div class="count-wrap">
        <div id="count" class="count">0</div>
        <div id="count-label" class="count-label">Score</div>
      </div>
      <div id="pulse" class="pulse"></div>
      <div id="players" class="players"></div>
      <div id="toast" class="toast"></div>
    </div>

    <!-- SETUP coaching -->
    <div class="panel setup-panel">
      <div class="coach-row">
        <span class="coach-dot"></span>
        <div id="coach-msg" class="coach-msg">Scanning…</div>
      </div>
      <ul id="coach-hints" class="coach-hints"></ul>
      <button id="setup-start" class="primary" disabled>Start</button>
      <p class="panel-note">Auto-detecting the target — or tap the view to place it yourself.</p>
    </div>

    <!-- PLAY controls -->
    <div class="panel play-panel">
      <button id="finish-btn" class="primary">Finish</button>
    </div>

    <!-- RESULT -->
    <div class="panel result-panel">
      <div id="result-pb" class="result-pb">New personal best</div>
      <div id="result-game" class="result-game"></div>
      <div id="result-total" class="result-total">0</div>
      <div id="result-breakdown" class="result-breakdown"></div>
      <div id="result-players" class="result-players"></div>
      <canvas id="share-card" class="share-card" width="540" height="720"></canvas>
      <div class="result-actions">
        <button id="again-btn" class="primary">Play again</button>
        <button id="share-save" class="ghost">Save card</button>
        <button id="result-home" class="ghost">Home</button>
      </div>
    </div>
  </section>

  <!-- On-device models for Camera mode (vendored locally, no CDN). Absent -> Simulation. -->
  <script src="vendor/tf.min.js" onerror="window.__noTF=1"></script>
  <script src="vendor/coco-ssd.min.js" onerror="window.__noCoco=1"></script>
  <script src="vendor/pose-detection.min.js" onerror="window.__noPose=1"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
