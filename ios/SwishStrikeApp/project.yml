# XcodeGen fallback for the hand-written SwishStrike.xcodeproj.
# Only needed if the committed project fails to open in your Xcode version:
#   brew install xcodegen && xcodegen generate
name: SwishStrike
options:
  bundleIdPrefix: com.binnu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SwishStrikeCore:
    path: ../SwishStrikeCore
targets:
  SwishStrike:
    type: application
    platform: iOS
    sources:
      - path: SwishStrike
    dependencies:
      - package: SwishStrikeCore
    info:
      path: SwishStrike/Info.plist
    settings:
      base:
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.binnu.swishstrike
